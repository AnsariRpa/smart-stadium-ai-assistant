<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Stadium AI Assistant</title>
    <meta name="description" content="AI Assistant for stadium navigation and crowd control.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-nav">
        <h1>Smart Stadium AI Assistant</h1>
        <div class="controls">
            <label for="route-strategy" class="sr-only">Route Strategy</label>
            <select id="route-strategy" aria-label="Route Strategy">
                <option value="shortest">Pref: Shortest Route</option>
                <option value="least_crowded">Pref: Least Crowded</option>
            </select>
            <label for="event-state" class="sr-only">Simulate State</label>
            <select id="event-state" aria-label="Simulate Stadium State">
                <option value="normal">Normal</option>
                <option value="entry_rush">Entry Rush</option>
                <option value="halftime">Halftime Spike</option>
                <option value="exit_surge">Exit Surge</option>
            </select>
        </div>
    </header>

    <main class="dashboard">
        <section class="left-panel" aria-label="Stadium Map Visualization">
            <div class="map-container" id="svg-map-container">
                <!-- SVG map generated by stadium-map.js -->
            </div>
            <div class="legend">
                <span class="legend-item"><span class="dot green"></span> Low (< 50%)</span>
                <span class="legend-item"><span class="dot yellow"></span> Med (50-80%)</span>
                <span class="legend-item"><span class="dot red"></span> High (> 80%)</span>
            </div>
        </section>

        <section class="right-panel" aria-label="AI Assistant Chat">
            <div class="chat-window" id="chat-window" role="log" aria-live="polite">
                <div class="message ai">
                    <p>Welcome to the Smart Stadium. How can I assist you today?</p>
                </div>
            </div>
            <form id="chat-form" class="chat-input" onsubmit="event.preventDefault(); sendQuery();">
                <label for="query-input" class="sr-only">Type your question</label>
                <input type="text" id="query-input" placeholder="E.g., Where is the food stall?" aria-label="Chat Input" required>
                <button type="submit" aria-label="Send Message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </section>
    </main>

    <script src="js/stadium-map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
